<script src="{{ site.url }}/assets/js/jquery.tagcloud.js"></script>
<div id='category_cloud'>
    <div class="categories">
        {% for cat in site.categories %}
        <a href="/categories/#{{cat | first}}" rel="{{ cat|last|size  }}">{{cat | first}}</a>
        {% endfor %}
    </div>
</div>
<script>
$.fn.tagcloud.defaults = {
  size: {start: 18, end: 24, unit: 'pt'},
  color: {start: 'CDE', end: '#428bca'}
};
 
$(function () {
  $('.categories a').tagcloud();
});
</script>
